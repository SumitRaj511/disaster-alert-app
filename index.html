<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Alert</title>
    
    <!-- Tailwind CSS (CDN for zero-install) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#f59e0b',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        success: '#10b981',
                        darkbg: '#0a0a0a',
                        cardbg: '#111111'
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">


    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darkbg text-white h-screen flex flex-col overflow-hidden relative font-sans antialiased">
    
    <!-- Intro Scroll Reveal Screen -->
    <div id="intro-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center">
        <!-- Spotlight Overlay -->
        <div id="text-spotlight" class="fixed inset-0 pointer-events-none z-[210] mix-blend-multiply transition-opacity duration-500" style="background: radial-gradient(circle 250px at var(--mouse-x, 50%) var(--mouse-y, 50%), #ef4444 0%, #f59e0b 30%, #3b82f6 60%, #ffffff 100%);"></div>

        <!-- Centered content -->
        <div class="text-center px-4" id="scroll-reveal-container" style="transition: opacity 0.08s ease-out, transform 0.08s ease-out;">
            <p class="scroll-reveal-text text-white font-bold" style="font-size: clamp(3rem, 10vw, 8rem); letter-spacing: -0.02em;">Disaster Alert</p>
            <div class="mt-16 animate-bounce opacity-50" id="scroll-indicator">
                <p class="text-xs uppercase tracking-widest mb-2">Scroll Up</p>
                <i class="fa-solid fa-arrow-up"></i>
            </div>
        </div>
    </div>

    <!-- Cursor Tracker Glow -->
    <div id="cursor-glow" class="fixed w-96 h-96 rounded-full pointer-events-none z-0" style="background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, rgba(0,0,0,0) 70%); transform: translate(-50%, -50%); transition: transform 0.1s ease-out; opacity: 0;"></div>

    <!-- Navbar -->
    <nav class="border-b border-white/5 bg-darkbg/80 backdrop-blur-md z-50 px-6 py-4 flex justify-between items-center relative">
        <div class="flex items-center gap-3">
            <div class="text-primary">
                <i class="fa-solid fa-triangle-exclamation text-xl"></i>
            </div>
            <h1 class="text-xl font-semibold tracking-tight text-white/90">
                Disaster Alert
            </h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button id="open-safety-btn" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white/90 px-4 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-shield-halved text-primary"></i>
                <span class="hidden sm:inline">Safety Guide</span>
            </button>
            <button id="open-modal-btn" class="bg-white text-black hover:bg-gray-200 px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-plus"></i>
                <span class="hidden sm:inline">Report Disaster</span>
            </button>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <div class="flex-1 flex flex-col md:flex-row gap-6 p-6 h-[calc(100vh-80px)] relative z-10">
        
        <!-- Map Section -->
        <div class="flex-1 h-full min-h-[400px]">
            <div class="h-full w-full bg-cardbg border border-white/5 rounded-2xl p-2 relative z-10 shadow-2xl">
                <div id="map" class="w-full h-full rounded-xl z-0"></div>
            </div>
        </div>

        <!-- Feed Section -->
        <div class="w-full md:w-[400px] lg:w-[350px] h-full flex flex-col relative z-10">
            <div class="bg-cardbg border border-white/5 rounded-2xl flex-1 p-5 flex flex-col overflow-hidden shadow-2xl">
                <h2 class="text-sm uppercase tracking-wider font-semibold text-white/60 mb-4 flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
                    </span>
                    Live Feed
                </h2>
                <div id="feed-container" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3 custom-scrollbar">
                    <!-- Feed items injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="report-modal" class="fixed inset-0 z-[100] flex items-center justify-center px-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- Backdrop -->
        <div id="modal-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm cursor-pointer"></div>

        <!-- Modal Content -->
        <div class="relative w-full max-w-lg bg-cardbg border border-white/10 rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="modal-content">
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-white/90">
                    Report an Incident
                </h2>
                <button id="close-modal-btn" class="p-2 hover:bg-white/10 rounded-full text-white/60 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form id="report-form" class="p-6 flex flex-col gap-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label for="type-select" class="text-sm font-medium text-white/70">Disaster Type</label>
                        <select id="type-select" class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-primary transition-colors">
                            <option value="Fire">Fire</option>
                            <option value="Flood">Flood</option>
                            <option value="Theft">Theft</option>
                            <option value="Bomb">Bomb</option>
                            <option value="Earthquake">Earthquake</option>
                            <option value="Accident">Accident</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="space-y-1.5">
                        <label for="severity-select" class="text-sm font-medium text-white/70">Severity</label>
                        <select id="severity-select" class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-primary transition-colors">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High" selected>High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-white/70">Location</label>
                    <div id="location-display" class="hidden flex items-start gap-2 bg-white/5 border border-success/30 rounded-lg p-3 text-sm text-white/90">
                        <i class="fa-solid fa-location-dot text-success mt-1"></i>
                        <span id="address-text">Address</span>
                    </div>
                    <button type="button" id="get-location-btn" class="w-full flex items-center justify-center gap-2 bg-primary/10 hover:bg-primary/20 border border-primary/30 text-primary rounded-lg px-4 py-3 transition-colors">
                        <i class="fa-solid fa-location-crosshairs"></i>
                        <span>Use Current Location</span>
                    </button>
                </div>

                <div class="space-y-1.5">
                    <label for="description-text" class="text-sm font-medium text-white/70">Description</label>
                    <textarea id="description-text" required rows="3" placeholder="Provide details about the situation..." class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors resize-none"></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submit-btn" disabled class="w-full bg-white hover:bg-gray-200 text-black disabled:opacity-50 disabled:hover:bg-white text-sm font-semibold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2">
                        Submit Alert
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Safety Guide Modal -->
    <div id="safety-modal" class="fixed inset-0 z-[100] flex items-center justify-center px-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- Backdrop -->
        <div id="safety-modal-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm cursor-pointer"></div>

        <!-- Modal Content -->
        <div class="relative w-full max-w-2xl h-[80vh] max-h-[640px] bg-cardbg border border-white/10 rounded-2xl shadow-2xl overflow-hidden flex flex-col transform scale-95 transition-transform duration-300" id="safety-modal-content">
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center flex-shrink-0">
                <h2 class="text-lg font-semibold text-white/90 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-primary"></i>
                    Safety Guide
                </h2>
                <button id="close-safety-modal-btn" class="p-2 hover:bg-white/10 rounded-full text-white/60 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="flex flex-1 overflow-hidden">
                <!-- Disaster type tabs -->
                <div id="safety-tabs" class="w-28 sm:w-44 flex-shrink-0 border-r border-white/5 overflow-y-auto custom-scrollbar py-2">
                    <!-- Injected via JS -->
                </div>
                <!-- Tip content -->
                <div id="safety-content" class="flex-1 overflow-y-auto custom-scrollbar p-6">
                    <!-- Injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
